<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Workshop Helmsman{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">⚓</span>
      <span class="brand-name">Workshop Helmsman</span>
    </a>
    <nav class="topnav">
      {% block topnav %}{% endblock %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <small>Workshop Helmsman · self-hosted milestone tracker · Phase 1</small>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
