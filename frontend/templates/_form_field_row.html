<div class="form-row" data-idx="0">
  <div class="form-row-head">
    <strong class="row-label-text">{{ f.label or f.key }}</strong>
    <button type="button" class="btn-row-remove" data-action="remove" aria-label="Remove field">×</button>
  </div>
  <div class="form-row-grid">
    <label><span>Key</span><input data-bind="key" value="{{ f.key }}" placeholder="snake_case_key" /></label>
    <label><span>Label</span><input data-bind="label" value="{{ f.label }}" placeholder="Display label" /></label>
    <label><span>Placeholder</span><input data-bind="placeholder" value="{{ f.placeholder or '' }}" placeholder="(text fields only)" /></label>
    <label class="chk"><input type="checkbox" data-bind="required" {% if f.required %}checked{% endif %} /> Required</label>
  </div>
  <div class="form-row-options" data-show="dropdown" {% if f.type != 'dropdown' %}hidden{% endif %}>
    <label>
      <span>Dropdown options (one per line)</span>
      <textarea data-bind="options" rows="3">{{ (f.options or []) | join('\n') }}</textarea>
    </label>
  </div>
  <input type="hidden" data-bind="type" value="{{ f.type }}" />
</div>
