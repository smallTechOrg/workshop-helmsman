# Production compose used ON THE VM by the Deploy workflow.
# Unlike docker-compose.yml (which builds locally), this PULLS a pre-built image
# pushed to GHCR by .github/workflows/deploy.yml. $HELMSMAN_IMAGE is exported by
# the deploy job to the exact sha-tagged image; it falls back to :latest for a
# manual `docker compose -f docker-compose.prod.yml up -d` on the box.
#
# The VM keeps /opt/helmsman/.env (HELMSMAN_ADMIN_KEY, HELMSMAN_DOMAIN,
# ACME_EMAIL, OPENROUTER_API_KEY). Secrets never leave the VM.

services:
  app:
    image: ${HELMSMAN_IMAGE:-ghcr.io/smalltechorg/workshop-helmsman:latest}
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "8001"
      DATABASE_URL: "sqlite:///data/helmsman.db"
      HELMSMAN_BASE_URL: "https://${HELMSMAN_DOMAIN:?set HELMSMAN_DOMAIN in .env}"
    volumes:
      - helmsman-data:/srv/helmsman/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8001/api/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "8001"
    ports:
      # Expose loopback only so the deploy health check can reach it; Caddy
      # fronts the public interface.
      - "127.0.0.1:8001:8001"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  helmsman-data:
  caddy-data:
  caddy-config:
